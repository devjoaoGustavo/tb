name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -timeout 120s ./...

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: echo "version=v$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Check release conditions
        id: check
        run: |
          # Skip if the tag already exists (e.g. post-release CHANGELOG commit re-triggering this).
          if git rev-parse "${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.version.outputs.version }} already exists — skipping."
            exit 0
          fi

          # Skip if [Unreleased] section has no content.
          NOTES=$(awk '/^## \[Unreleased\]/{found=1; next} found && /^## \[/{exit} found{print}' CHANGELOG.md \
                    | sed '/^[[:space:]]*$/d')
          if [ -z "$NOTES" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "[Unreleased] section is empty — nothing to release."
            exit 0
          fi

          echo "$NOTES" > /tmp/release-notes.md
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@v5
        if: steps.check.outputs.skip == 'false'
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binaries
        if: steps.check.outputs.skip == 'false'
        run: make dist
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Create tag and GitHub release
        if: steps.check.outputs.skip == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git tag "${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"
          gh release create "${{ steps.version.outputs.version }}" \
            --title "${{ steps.version.outputs.version }}" \
            --notes-file /tmp/release-notes.md \
            dist/*

      - name: Update CHANGELOG.md
        if: steps.check.outputs.skip == 'false'
        run: |
          python3 -c "
          import sys
          from datetime import date
          version = sys.argv[1][1:]  # strip leading 'v'
          today = date.today().strftime('%Y-%m-%d')
          content = open('CHANGELOG.md').read()
          content = content.replace(
              '## [Unreleased]',
              '## [Unreleased]\n\n## [' + version + '] - ' + today,
              1,
          )
          open('CHANGELOG.md', 'w').write(content)
          " "${{ steps.version.outputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore: update changelog for ${{ steps.version.outputs.version }} [skip ci]"
          git push origin main
